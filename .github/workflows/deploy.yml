name: Deploy (dev → Azure VPS)

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VPS_HOST }}
          username: ${{ secrets.AZURE_VPS_USER }}
          key: ${{ secrets.AZURE_VPS_SSH_KEY }}
          port: ${{ vars.AZURE_VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m

          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ vars.DEPLOY_PATH || 'shg-api' }}"
            REPO_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="dev"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            git fetch --prune origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fdx -e .env -e .env.*

            echo "Deploying commit $(git rev-parse --short HEAD)"

            echo "Building images..."
            DOCKER_BUILDKIT=1 docker compose -f docker-compose.dev.yml build

            echo "Running migrations..."
            docker compose -f docker-compose.dev.yml run --rm migrate

            echo "Starting services..."
            docker compose -f docker-compose.dev.yml up -d --remove-orphans

            echo "Cleaning old images..."
            docker image prune -f