services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shg-api:latest
    pull_policy: build
    command: node dist/src/db/migrate.js
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: "no"

  api:
    image: shg-api:latest
    pull_policy: never
    container_name: shg-api
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    expose:
      - "8080"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true