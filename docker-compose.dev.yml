services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shg-api:latest
    container_name: shg-api-dev
    restart: unless-stopped
    pull_policy: build
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - dokploy-network
    expose:
      - "8080"

  migrate:
    image: shg-api:latest
    pull_policy: never
    command: node dist/src/db/migrate.js
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: "no"

networks:
  dokploy-network:
    external: true
