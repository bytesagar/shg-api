name: Deploy (dev → Azure VPS)

# SSHes into the VPS, pulls latest code, runs migrations,
# then rebuilds and restarts the API container.
#
# Required repository secrets:
#   AZURE_VPS_HOST       Public IP or DNS of the Azure VPS
#   AZURE_VPS_USER       SSH user
#   AZURE_VPS_SSH_KEY    Private key (PEM)
#
# Optional repository variables:
#   AZURE_VPS_PORT       SSH port, defaults to 22
#   DEPLOY_PATH          Repo location on VPS, defaults to shg-api

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & restart on VPS
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VPS_HOST }}
          username: ${{ secrets.AZURE_VPS_USER }}
          key: ${{ secrets.AZURE_VPS_SSH_KEY }}
          port: ${{ vars.AZURE_VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          envs: GITHUB_SHA
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ vars.DEPLOY_PATH || 'shg-api' }}"
            REPO_URL="git@github.com:${{ github.repository }}.git"
            BRANCH="dev"

            # First-time clone
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              mkdir -p "$DEPLOY_PATH"
              git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"

            # Sync to exactly origin/dev
            git fetch --prune origin "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fdx -e .env -e .env.*

            echo "Deploying commit $(git rev-parse --short HEAD)"

            # Run migrations before restarting API
            echo "Running database migrations..."
            docker compose -f docker-compose.dev.yml run --rm api \
              npx drizzle-kit migrate --config=drizzle.config.prod.ts

            # Rebuild & restart
            DOCKER_BUILDKIT=1 docker compose -f docker-compose.dev.yml up -d --build --remove-orphans

            # Cleanup
            docker image prune -f
