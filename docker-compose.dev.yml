services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shg-api:latest
    pull_policy: build
    command: node dist/src/db/migrate.js
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: "no"

  api:
    image: shg-api:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      JITSI_JAAS_APP_ID: ${JITSI_JAAS_APP_ID}
      JITSI_JAAS_APP_SECRET: ${JITSI_JAAS_APP_SECRET}
      JITSI_JAAS_KID: ${JITSI_JAAS_KID}
      JITSI_JAAS_PRIVATE_KEY: ${JITSI_JAAS_PRIVATE_KEY}
      JITSI_JOIN_JWT_EXPIRES_IN: ${JITSI_JOIN_JWT_EXPIRES_IN}
      JITSI_WEBHOOK_SECRET: ${JITSI_WEBHOOK_SECRET}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_ATTACHMENTS_BUCKET: ${S3_ATTACHMENTS_BUCKET}
    expose:
      - "8080"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true