services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shg-api:latest
    container_name: shg-api-dev
    restart: unless-stopped
    pull_policy: build
    env_file:
      - .env.development
    networks:
      - shg-net
    expose:
      - "8080"

  migrate:
    image: shg-api:latest
    pull_policy: never
    command: node dist/src/db/migrate.js
    env_file:
      - .env.development
    networks:
      - shg-net
    restart: "no"

networks:
  shg-net:
    external: true
