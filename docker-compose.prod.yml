services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shg-api:prod
    pull_policy: build
    command: node dist/src/db/migrate.js
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    networks:
      - dokploy-network
    restart: "no"

  # Idempotent reference data only (geography, ICD-11, medicines, vaccines,
  # facility catalog, IMNCI). The seed script hard-refuses demo data when
  # NODE_ENV=production.
  seed:
    image: shg-api:prod
    pull_policy: never
    command: node dist/src/db/seed.js reference
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    restart: "no"

  api:
    image: shg-api:prod
    pull_policy: never
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NODE_ENV: production
      # Pin the listen port so app, expose, and healthcheck agree.
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      JITSI_JAAS_APP_ID: ${JITSI_JAAS_APP_ID}
      JITSI_JAAS_APP_SECRET: ${JITSI_JAAS_APP_SECRET}
      JITSI_JAAS_KID: ${JITSI_JAAS_KID}
      JITSI_JAAS_PRIVATE_KEY: ${JITSI_JAAS_PRIVATE_KEY}
      JITSI_JOIN_JWT_EXPIRES_IN: ${JITSI_JOIN_JWT_EXPIRES_IN}
      JITSI_WEBHOOK_SECRET: ${JITSI_WEBHOOK_SECRET}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_ATTACHMENTS_BUCKET: ${S3_ATTACHMENTS_BUCKET}
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
